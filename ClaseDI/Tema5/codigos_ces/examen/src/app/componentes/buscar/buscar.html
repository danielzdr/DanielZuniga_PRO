<h2>Buscar Examen Por nota</h2>
<div class="row">
  <div class="col">
<input placeholder="introduce nota" class="form-control" [(ngModel)]="nota" />
<button class="btn btn-primary w-100" (click)="realizarBusqueda()">Buscar Notas</button>

@if (busqueda) {
  <p class="alert alert-primary">Encontradas {{ filtradas.length }}</p>
}

<div class="row row-cols-1 row-cols-md-4 g-4">
  @for (data of filtradas; track $index) {
    <app-carta [item]="data"></app-carta>
  }
  </div>
</div>
