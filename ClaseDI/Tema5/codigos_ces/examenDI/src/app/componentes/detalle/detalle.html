<div class="row">
  <div class="col">
    <img [src]="libro!! | imagenes" />
  </div>
  <div>
    <p>
      {{ libro?.Title | uppercase }}
    </p>
    <p>
      {{ libro?.Year }}
    </p>
    <p>
      {{ libro?.Pages }}
    </p>
    <ul class="list-group">
      @for (item of libro?.Villanos; track $index) {
        <li class="lit-group-item">
          {{ item }}
        </li>
      }
    </ul>
  </div>
</div>
